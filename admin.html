<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<link rel="stylesheet" href="admin-style.css">
</head>

<body>

<center><h1>Admin Dashboard</h1></center>
<button  class="log"  onclick="logout()">Logout</button>
<div class="top-bar">

<input type="text" id="search" placeholder="Search by name or email">
<div class="analytics"></div>
<div class="card"><h3>Total Messages </h3>
<p id="counter">0</p>
</div>
<div class="card">
<h3>Today Messages</h3>
<p id="today">0</p>
</div>
</div>
<div class="service-stats">

<div class="box">
<h3 id="webCount">0</h3>
<h4>Web Development</h4>
</div>

<div class="box">
<h3 id="mobileCount">0</h3>
<h4>Mobile App</h4>
</div>

<div class="box">
<h3 id="marketingCount">0</h3>
<h4>Digital Marketing</h4>
</div>

</div>


</div>

<div class="filters">

<button onclick="filterService('all')">All</button>

<button onclick="filterService('web development')">Web</button>

<button onclick="filterService('mobile app')">Mobile</button>

<button onclick="filterService('digital marketing')">Marketing</button>

</div>
<div id="messages"></div>
<audio id="notifSound" src="notification.mp3" preload="auto"></audio>
<script>

if(localStorage.getItem("adminLogin") !== "true"){
  window.location.href = "admin-login.html";
}

function logout(){
  localStorage.removeItem("adminLogin");
  window.location.href = "admin-login.html";
}

</script>

<script type="module" src="firebase-admin.js"></script>

</body>
</html>
